    <div class="modal-actions stacked">
      <button class="btn btn-danger" id="clear-confirm-btn">Download backup and clear everything</button>
      <button class="btn btn-tertiary" id="clear-cancel-btn">Cancel</button>
    </div>
  `);
  document.getElementById('clear-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('clear-confirm-btn').addEventListener('click', clearAllData);
}

async function clearAllData() {
  // Safety net first: dump whatever's there to a JSON file so the user has
  // an off-ramp if they panic. If there's nothing to back up, skip the file.
  try {
    if (state.data.entries.length > 0) {
      const content = JSON.stringify(state.data, null, 2);
      downloadFile(backupFilename(), content);
    }
  } catch (e) {
    console.error('pre-clear backup download failed', e);
  }

  // Wipe IndexedDB snapshots too — keeping them defeats the "start fresh" intent.
  if (db) {
    try {
      const snaps = await idbGetAll(SNAP_STORE);
      for (const s of snaps) await idbDelete(SNAP_STORE, s.timestamp);
    } catch (e) { console.error('snapshot wipe failed', e); }
  }

  state.data = newEmptyData();
  // Mark as already-seeded so the demo entries don't return on next load.
  state.data.meta.hasSeeded = true;
  state.lastSnapshotTime = 0;

  const ok = await save({ snapshot: false });
  if (!ok) {
    notify('Clear failed — your data was not wiped.', 'error');
    return;
  }
  closeModal();
  render();
  notify('All data cleared. Starting fresh.', 'ok');
}

function openBackupMenu() {
  openModal(`
    <h3>Backup</h3>
    <p class="modal-help">Saves a JSON file of your full dataset — entries, chips, and metadata. Keep at least one copy off-device.</p>
    <div class="modal-actions stacked">
      <button class="btn btn-primary" id="bk-file-btn">Download as file</button>
      <button class="btn btn-secondary" id="bk-clip-btn">Copy JSON to clipboard</button>
      <button class="btn btn-tertiary" id="bk-cancel-btn">Cancel</button>
    </div>
  `);
  document.getElementById('bk-file-btn').addEventListener('click', async () => { await backupToFile(); closeModal(); });
  document.getElementById('bk-clip-btn').addEventListener('click', async () => { await backupToClipboard(); closeModal(); });
  document.getElementById('bk-cancel-btn').addEventListener('click', closeModal);
}

function openRestoreMenu() {
  openModal(`
    <h3>Restore from backup</h3>
    <p class="modal-help">Upload a backup file or paste JSON. Then choose Merge (dedupe by id, keep newest) or Replace (overwrite everything).</p>
    <div class="form-row"><span>File</span><input type="file" id="restore-file" accept="application/json,.json"></div>
    <textarea class="restore-textarea" id="restore-paste" placeholder="…or paste backup JSON here"></textarea>
    <div class="modal-actions stacked">
      <button class="btn btn-primary" id="restore-merge-btn">Merge (keep both, dedupe by id)</button>
      <button class="btn btn-danger" id="restore-replace-btn">Replace (overwrite current)</button>
      <button class="btn btn-tertiary" id="restore-cancel-btn">Cancel</button>
    </div>
  `);

  document.getElementById('restore-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      document.getElementById('restore-paste').value = text;
    } catch (err) {
      notify('File read failed: ' + (err.message || err), 'error');
    }
  });

  async function doRestore(mode) {
    const text = (document.getElementById('restore-paste').value || '').trim();
    if (!text) { notify('Paste backup JSON or upload a file first.', 'warn'); return; }

    let parsed;
    try { parsed = JSON.parse(text); }
    catch (e) { notify('Invalid JSON: ' + e.message, 'error'); return; }

    const migrated = migrate(parsed);
    if (!isValidData(migrated)) { notify('Backup is not a valid tracker dataset.', 'error'); return; }

    if (mode === 'replace') {
      if (!confirm(`Replace will overwrite ALL current data (${state.data.entries.length} entries) with ${migrated.entries.length} from the backup. Continue?`)) return;
      await takeSnapshot(JSON.parse(JSON.stringify(state.data)));
      const prev = state.data;
      state.data = migrated;
      const ok = await save({ snapshot: false });
      if (!ok) { state.data = prev; return; }
    } else {
      const prev = JSON.parse(JSON.stringify(state.data));
      await takeSnapshot(prev);

      const byId = new Map();
      for (const e of state.data.entries) byId.set(e.id, e);
      let added = 0, updated = 0;
      for (const e of migrated.entries) {
        const existing = byId.get(e.id);
        if (!existing) { byId.set(e.id, e); added++; }
        else {
          const eAt = new Date(e.updatedAt || e.timestamp).getTime();
          const exAt = new Date(existing.updatedAt || existing.timestamp).getTime();
          if (eAt > exAt) { byId.set(e.id, e); updated++; }
        }
      }
      state.data.entries = Array.from(byId.values());

      const chipSet = new Set(state.data.chips);
      for (const c of migrated.chips) chipSet.add(c);
      state.data.chips = Array.from(chipSet);

      const ok = await save({ snapshot: false });
      if (!ok) { state.data = prev; return; }
      notify(`Merged: ${added} new, ${updated} updated. ${state.data.entries.length} total.`, 'ok');
      closeModal();
      render();
      return;
    }

    notify(`Restored: ${state.data.entries.length} entries.`, 'ok');
    closeModal();
    render();
  }

  document.getElementById('restore-merge-btn').addEventListener('click', () => doRestore('merge'));
  document.getElementById('restore-replace-btn').addEventListener('click', () => doRestore('replace'));
  document.getElementById('restore-cancel-btn').addEventListener('click', closeModal);
}

// ============================================================================
// Snapshots UI
// ============================================================================
async function openSnapshotsMenu() {
  let snaps;
  try { snaps = db ? await idbGetAll(SNAP_STORE) : []; }
  catch (e) { notify('Could not load snapshots: ' + (e.message || e), 'error'); return; }
  snaps.sort((a, b) => b.timestamp.localeCompare(a.timestamp));

  let listHtml = '';
  if (snaps.length === 0) {
    listHtml = '<div class="empty">No snapshots yet. Taken automatically as you add entries.</div>';
  } else {
    listHtml = '<ul class="snapshot-list">';
    for (const s of snaps) {
      const display = new Date(s.timestamp).toLocaleString();
      const count = (s.data && Array.isArray(s.data.entries)) ? s.data.entries.length : '?';
      listHtml += `<li class="snapshot-item">
        <div class="snapshot-meta">
          <div class="snapshot-time">${display}</div>
          <div class="snapshot-count">${count} entries</div>
        </div>
        <button class="btn btn-secondary" data-ts="${s.timestamp}">Restore</button>
      </li>`;
    }
    listHtml += '</ul>';
  }

  openModal(`
    <h3>Snapshots</h3>
    <p class="modal-help">Up to ${MAX_SNAPSHOTS} rolling local snapshots. Restoring rolls your data back to that point; the current state is snapshotted first so you can undo.</p>
    ${listHtml}
    <div class="modal-actions">
      <button class="btn btn-tertiary" id="snap-close-btn">Close</button>
    </div>
  `);
  document.getElementById('snap-close-btn').addEventListener('click', closeModal);
  document.querySelectorAll('.snapshot-item button[data-ts]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const ts = btn.dataset.ts;
      if (!confirm(`Restore to snapshot from ${new Date(ts).toLocaleString()}? Current state will be snapshotted first.`)) return;
      const rec = await idbGet(SNAP_STORE, ts);
      if (!rec) { notify('Snapshot not found.', 'error'); return; }
      const migrated = migrate(rec.data);
      if (!isValidData(migrated)) { notify('Snapshot is corrupt.', 'error'); return; }
      await takeSnapshot(JSON.parse(JSON.stringify(state.data)));
      const prev = state.data;
      state.data = migrated;
      const ok = await save({ snapshot: false });
      if (!ok) { state.data = prev; return; }
      notify('Restored from snapshot.', 'ok');
      closeModal();
      render();
    });
  });
}

// ============================================================================
// Persistence status
// ============================================================================
function relativeTimeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 45 * 1000) return 'just now';
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  const months = Math.floor(days / 30);
  return months + 'mo ago';
}

// Header status indicator: a colored dot (data-safety signal) plus a short
// glanceable activity line ("Last entry 12m ago"). The title attribute carries
// the long-form persistence explanation that used to be the visible text.
function updateStatusIndicator() {
  const indicator = document.getElementById('persistence-status');
  if (!indicator || !state.data) return;

  let dotClass;
  let title;
  if (state.previewMode) {
    dotClass = 'dot-warn';
    title = "This window can't save anything — nothing you do persists. Open the app from a real URL (or open the file directly in your browser) to use it for real.";
  } else if (state.storagePersistent === true) {
    dotClass = 'dot-ok';
    title = "Your browser has promised not to evict this app's data under storage pressure.";
  } else {
    dotClass = 'dot-warn';
    title = "Your browser may delete this app's data under storage pressure or after a period of inactivity. Use Backup regularly.";
  }

  let text;
  if (state.previewMode) {
    text = 'Preview · changes lost on reload';
  } else if (!state.data.entries || state.data.entries.length === 0) {
    text = 'No entries yet';
  } else {
    let newestTs = '';
    for (const e of state.data.entries) {
      if (typeof e.timestamp === 'string' && e.timestamp > newestTs) newestTs = e.timestamp;
    }
    text = newestTs ? 'Last entry ' + relativeTimeAgo(newestTs) : 'No entries yet';
  }

  indicator.innerHTML = `<span class="dot ${dotClass}"></span> ${text}`;
  indicator.title = `${title}\n\n${state.data.entries.length} ${state.data.entries.length === 1 ? 'entry' : 'entries'} stored.`;
}

async function checkPersistence() {
  if (state.previewMode) { updateStatusIndicator(); return; }
  if (!navigator.storage || !navigator.storage.persisted) { updateStatusIndicator(); return; }
  let persisted = false;
  try {
    persisted = await navigator.storage.persisted();
    if (!persisted && navigator.storage.persist) {
      persisted = await navigator.storage.persist();
    }
  } catch (e) {
    console.error('persist() failed', e);
  }
  state.storagePersistent = persisted;
  updateStatusIndicator();
}

// ============================================================================
// Toast / Banner
// ============================================================================
function notify(msg, level = 'ok') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast toast-${level}`;
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));
  setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 250);
  }, 3800);
}

function showBanner(msg, level = 'warn') {
  const container = document.getElementById('banners');
  const el = document.createElement('div');
  el.className = `banner banner-${level}`;
  el.innerHTML = '<span class="banner-text"></span><button class="banner-dismiss">Dismiss</button>';
  el.querySelector('.banner-text').textContent = msg;
  el.querySelector('.banner-dismiss').addEventListener('click', () => el.remove());
  container.appendChild(el);
}

// ============================================================================
// Modal helpers
// ============================================================================
function openModal(html) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  content.innerHTML = html;
  overlay.classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-content').innerHTML = '';
  state.deletingId = null;
}

// ============================================================================
// Textarea auto-grow
// ============================================================================
function autoResize(textarea) {
  textarea.style.height = 'auto';
  // Generous cap — has to comfortably fit multi-line chip templates (Poo's
  // is 6 lines) without scrolling, and still leave room for an entry the
  // user fleshes out from there. Past this, the textarea internally scrolls.
  textarea.style.height = Math.min(textarea.scrollHeight, 480) + 'px';
}

// ============================================================================
// Init
// ============================================================================
async function init() {
  wireAppIcon();
  const ctx = detectStorageAvailability();

  // Surface ONE clear, plain-language banner up front. Everything downstream
  // uses these flags instead of dumping raw exception text into the UI.
  if (ctx.ephemeral || (!ctx.lsOk && !ctx.idbOk)) {
    state.previewMode = true;
    if (ctx.ephemeral) {
      showBanner(
        "This is a preview window — your entries won't be saved here. To use the tracker for real, open index.html directly in your browser (double-click the file, or host it on a server).",
        'info'
      );
    } else {
      showBanner(
        "Your browser is blocking all local storage, so entries won't be saved across reloads. Try opening this file in a different browser, or check your privacy / cookie settings.",
        'error'
      );
    }
  } else if (ctx.idbOk) {
    try {
      db = await openDB();
    } catch (_) {
      ctx.idbOk = false;
      if (ctx.lsOk) {
        showBanner("Your browser's primary storage isn't available. Entries will save to a backup copy only — please back up often using the Backup button.", 'warn');
      }
    }
  }

  if (!ctx.lsOk && !state.previewMode) {
    showBanner("Your browser's backup storage isn't available. Entries are still being saved, but please back up to a file regularly.", 'warn');
  }

  if (state.previewMode) {
    state.data = newEmptyData();
    seedDummyData(state.data);
  } else {
    const { data, source } = await loadData();
    state.data = data;
    if (db && (source === 'ls' || source === 'ls-only')) {
      // re-sync so both layers agree next load
      try { await save({ snapshot: false }); } catch (_) {}
    }
    // Seed demo entries only the first time — once we've ever seeded (or
    // the user has explicitly cleared everything), don't re-populate.
    if (state.data.entries.length === 0 && !state.data.meta.hasSeeded) {
      seedDummyData(state.data);
      state.data.meta.hasSeeded = true;
      await save({ snapshot: false });
    }
    await ensureInitialSnapshot(state.data);
  }

  checkPersistence();

  // Bind capture
  const ta = document.getElementById('entry-textarea');
  const dateEl = document.getElementById('entry-date');
  const timeEl = document.getElementById('entry-time');
  const addBtn = document.getElementById('entry-add-btn');
  const nowBtn = document.getElementById('entry-now-btn');

  // Set the date/time inputs to the current time and show/hide the Now button
  // accordingly. Used on load, after Add, by the periodic refresh, by the Now
  // button itself, and as the recovery path when the OS picker's "Reset"
  // wipes the field to blank on iOS.
  function resetDateTimeToNow() {
    const c = roundedNowISO();
    dateEl.value = toDateInput(c);
    timeEl.value = toTimeInput(c);
    nowBtn.classList.add('hidden');
  }

  // Reveal the Now button whenever the picker is no longer on the current
  // 5-minute slot. Cheaper than comparing Date objects — comparing the same
  // string form the inputs use.
  function updateNowButton() {
    if (!dateEl.value || !timeEl.value) { nowBtn.classList.add('hidden'); return; }
    const c = roundedNowISO();
    const isNow = dateEl.value === toDateInput(c) && timeEl.value === toTimeInput(c);
    nowBtn.classList.toggle('hidden', isNow);
  }

  resetDateTimeToNow();

  ta.addEventListener('input', () => autoResize(ta));
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      addEntry();
    }
  });
  addBtn.addEventListener('click', addEntry);

  // If the OS picker's Reset action clears either field, snap both back to
  // current. Otherwise just keep the Now button in sync with the value.
  function onDateTimeChange() {
    if (!dateEl.value || !timeEl.value) resetDateTimeToNow();
    else updateNowButton();
  }
  dateEl.addEventListener('change', onDateTimeChange);
  timeEl.addEventListener('change', onDateTimeChange);
  dateEl.addEventListener('input', onDateTimeChange);
  timeEl.addEventListener('input', onDateTimeChange);
  nowBtn.addEventListener('click', () => { resetDateTimeToNow(); ta.focus(); });

  document.getElementById('copy-since-btn').addEventListener('click', copySinceLastExport);
  document.getElementById('more-btn').addEventListener('click', openMoreMenu);

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'modal-overlay') closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Keep the date/time fields current if the page stays open without
  // user interaction. Only update when the user hasn't manually changed them.
  setInterval(() => {
    const focused = document.activeElement;
    if (focused !== dateEl && focused !== timeEl && ta.value.trim() === '') {
      resetDateTimeToNow();
    }
    // Keep "Last entry X ago" fresh even when nothing is happening.
    updateStatusIndicator();
  }, 30 * 1000);

  render();
  ta.focus();
}

window.addEventListener('DOMContentLoaded', init);
</script>
