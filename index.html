<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BAM Tracker">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="BAM Tracker">
<title>BAM Tracker</title>
<link rel="icon" href="images/icon.png">
<link rel="apple-touch-icon" href="images/icon.png">

<style>
:root {
  --bg: #f3f6f9;
  --surface: #ffffff;
  --surface-2: #f4f5f7;
  --text: #0a0a0a;
  --text-muted: #6b7280;
  --text-soft: #9ca3af;
  --border: #e7eaee;
  --border-strong: #d1d5db;

  --accent: #f97316;          /* the one bright orange — submit/primary */
  --accent-hover: #ea580c;
  --accent-text: #ffffff;
  --accent-soft: #fff4ec;

  --uncopied-bg: #fff7ed;
  --uncopied-bg-hover: #ffedd5;
  --uncopied-border: #fb923c;
  --uncopied-accent: #c2410c;

  --danger: #ef4444;
  --danger-hover: #dc2626;
  --warn-bg: #fff7ed;
  --warn-text: #9a3412;
  --warn-border: #fed7aa;
  --error-bg: #fef2f2;
  --error-text: #b91c1c;
  --ok-bg: #ecfdf5;
  --ok-text: #047857;

  --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.04), 0 1px 2px rgba(15, 23, 42, 0.03);
  --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.03);
  --shadow-lg: 0 20px 48px rgba(15, 23, 42, 0.12), 0 4px 12px rgba(15, 23, 42, 0.06);
  --shadow-glow: 0 6px 16px -4px rgba(249, 115, 22, 0.40);

  /* Concentric radius scale: nested elements step down by ~4px so each level
     "fits" inside its container. Bumped a full step for a softer all-round
     feel. Cards = 24, entries = 20, controls = 16, icon-sized targets = 12.
     True pills (chips, FAB) stay at 999px. */
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-xl: 24px;

  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-display: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0f14;
    --surface: #161b22;
    --surface-2: #1c232c;
    --text: #f5f7fa;
    --text-muted: #9aa4b2;
    --text-soft: #6b7585;
    --border: #232a33;
    --border-strong: #3a434f;

    --accent: #fb923c;
    --accent-hover: #fdba74;
    --accent-text: #0b0f14;
    --accent-soft: rgba(251, 146, 60, 0.12);

    --uncopied-bg: rgba(251, 146, 60, 0.08);
    --uncopied-bg-hover: rgba(251, 146, 60, 0.14);
    --uncopied-border: #fb923c;
    --uncopied-accent: #fdba74;

    --danger: #f87171;
    --danger-hover: #ef4444;
    --warn-bg: rgba(251, 146, 60, 0.12);
    --warn-text: #fdba74;
    --warn-border: rgba(251, 146, 60, 0.30);
    --error-bg: rgba(239, 68, 68, 0.10);
    --error-text: #fca5a5;
    --ok-bg: rgba(34, 197, 94, 0.10);
    --ok-text: #86efac;

    --shadow-xs: 0 1px 2px rgba(0,0,0,0.5);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.5);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
    --shadow-lg: 0 20px 48px rgba(0,0,0,0.7);
    --shadow-glow: 0 6px 16px -4px rgba(251, 146, 60, 0.45);
  }
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  background-image: linear-gradient(180deg, #b4d7ea 0%, #d6e7f1 18%, #eef3f6 42%, #f7f6f2 70%, #faf6ef 100%);
  background-attachment: fixed;
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "cv11", "ss01", "ss03";
  padding-bottom: env(safe-area-inset-bottom);
  letter-spacing: -0.005em;
  min-height: 100vh;
}
@media (prefers-color-scheme: dark) {
  body {
    background-image: linear-gradient(180deg, #0f1721 0%, #0c1219 35%, #0b0f14 70%);
  }
}

button, input, textarea { font-family: inherit; color: inherit; }

.header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(220, 233, 243, 0.55);
  border-bottom: 1px solid rgba(255, 255, 255, 0.4);
  backdrop-filter: saturate(160%) blur(24px);
  -webkit-backdrop-filter: saturate(160%) blur(24px);
  padding-top: env(safe-area-inset-top);
}
@media (prefers-color-scheme: dark) {
  .header { background: rgba(15, 23, 33, 0.6); border-bottom-color: rgba(255,255,255,0.04); }
}
.header-inner {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  gap: 12px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.brand-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.10);
}
.title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.025em;
  color: var(--text);
}
.persistence-status {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: help;
  white-space: nowrap;
  font-weight: 450;
}
.dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
}
.dot-ok { background: #22c55e; }
.dot-warn { background: #eab308; }
.dot-err { background: #ef4444; }

.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 20px 96px;
}

.banners-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: var(--radius-md);
  font-size: 13.5px;
  border: 1px solid;
  line-height: 1.45;
}
.banner-warn { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
.banner-error { background: var(--error-bg); color: var(--error-text); border-color: #fecaca; }
.banner-info { background: var(--surface); color: var(--text); border-color: var(--border); box-shadow: var(--shadow-xs); }
.banner-text { flex: 1; }
.banner-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.banner-dismiss {
  background: transparent;
  border: none;
  color: inherit;
  cursor: pointer;
  font-size: 13px;
  opacity: 0.7;
  padding: 4px 8px;
  border-radius: 6px;
  font-weight: 500;
}
.banner-dismiss:hover { opacity: 1; background: rgba(0,0,0,0.04); }

.capture {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--radius-xl);
  padding: 18px 18px 14px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-md);
  transition: box-shadow 0.18s ease, transform 0.18s ease;
}
.capture:focus-within {
  box-shadow: var(--shadow-lg);
}
@media (prefers-color-scheme: dark) {
  .capture { border-color: var(--border); }
}
#entry-textarea {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 16px;
  color: var(--text);
  resize: none;
  outline: none;
  padding: 6px 4px;
  min-height: 80px;
  line-height: 1.5;
  display: block;
  letter-spacing: -0.005em;
}
#entry-textarea::placeholder { color: var(--text-soft); opacity: 1; }

.capture-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  align-items: center;
}
#entry-date, #entry-time {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  padding: 10px 14px;
  /* 16px so iOS Safari doesn't auto-zoom on focus */
  font-size: 16px;
  outline: none;
  min-width: 0;
  color: var(--text);
  transition: background 0.12s, border-color 0.12s;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
#entry-time { flex: 0.85; }
#entry-date:hover, #entry-time:hover { background: #eef0f3; }
#entry-date:focus, #entry-time:focus { background: var(--surface); border-color: var(--border-strong); }
@media (prefers-color-scheme: dark) {
  #entry-date:hover, #entry-time:hover, #entry-now-btn:hover { background: #232a33; }
}
#entry-now-btn {
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 16px;
  color: var(--text);
  font-weight: 500;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.12s, border-color 0.12s, transform 0.05s;
  -webkit-tap-highlight-color: transparent;
}
#entry-now-btn:hover { background: #eef0f3; }
#entry-now-btn:active { transform: scale(0.97); }

.copy-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.95);
  color: var(--accent);
  border-radius: 999px;
  min-width: 24px;
  height: 24px;
  padding: 0 7px;
  font-size: 13px;
  font-weight: 700;
  margin-left: 10px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
#entry-add-btn {
  width: 44px;
  height: 44px;
  min-width: 44px;
  padding: 0;
  border-radius: 50%;
  background: var(--accent);
  color: var(--accent-text);
  box-shadow: var(--shadow-glow);
  font-size: 0;
  flex-shrink: 0;
  position: relative;
}
#entry-add-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='19' x2='12' y2='5'/><polyline points='5 12 12 5 19 12'/></svg>");
  background-repeat: no-repeat;
  background-position: center;
  background-size: 20px;
}
#entry-add-btn:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
#entry-add-btn:active:not(:disabled) { transform: scale(0.95); }
@media (prefers-color-scheme: dark) {
  #entry-add-btn::before {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230b0f14' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='19' x2='12' y2='5'/><polyline points='5 12 12 5 19 12'/></svg>");
  }
}

.chips-row {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  overflow-x: auto;
  padding: 2px 0 6px;
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
}
.chips-row::-webkit-scrollbar { height: 4px; }
.chips-row::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
.chip {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.08s, box-shadow 0.12s;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: -0.005em;
}
.chip:hover { background: var(--surface-2); border-color: #b8c0ca; }
.chip:active { transform: scale(0.97); }
@media (prefers-color-scheme: dark) {
  .chip:hover { background: var(--surface-2); border-color: var(--border-strong); }
}
.chip-edit {
  color: var(--text-muted);
  background: transparent;
  border: 1px dashed var(--border-strong);
}
.chip-edit:hover { background: var(--surface-2); border-style: dashed; }

.btn {
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  padding: 11px 18px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.05s, opacity 0.12s, box-shadow 0.12s;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  letter-spacing: -0.005em;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:active:not(:disabled) { transform: scale(0.985); }
.btn-primary {
  background: var(--accent);
  color: var(--accent-text);
  box-shadow: var(--shadow-glow);
  font-weight: 600;
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 8px 20px -6px rgba(249, 115, 22, 0.5);
}
.btn-secondary {
  background: var(--surface);
  border-color: var(--border-strong);
  color: var(--text);
}
.btn-secondary:hover:not(:disabled) { background: var(--surface-2); border-color: #b8c0ca; }
@media (prefers-color-scheme: dark) {
  .btn-secondary:hover:not(:disabled) { border-color: var(--border-strong); }
}
.btn-tertiary {
  background: transparent;
  color: var(--text-muted);
}
.btn-tertiary:hover:not(:disabled) { background: var(--surface-2); color: var(--text); }
.btn-danger {
  background: var(--danger);
  color: white;
}
.btn-danger:hover:not(:disabled) { background: var(--danger-hover); }
.btn-block { width: 100%; }
.btn-small { padding: 7px 12px; font-size: 13px; }

.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}
.actions-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}
.actions-row #copy-since-btn { flex: 1; }
.btn-icon-only {
  width: 48px;
  flex-shrink: 0;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
}
.btn-icon-only:hover:not(:disabled) { color: var(--text); }
.btn-icon-only svg { display: block; }

.entries-container { display: flex; flex-direction: column; gap: 28px; }
.day-group { display: flex; flex-direction: column; }
.day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px 10px;
  margin-bottom: 4px;
}
.day-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.day-meta {
  font-size: 11px;
  color: var(--text-soft);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.entry {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  column-gap: 14px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 12px 12px 36px;
  margin-top: 8px;
  box-shadow: var(--shadow-xs);
  transition: border-color 0.12s, box-shadow 0.12s;
  position: relative;
  min-height: 56px;
}
.entry:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
.entry.uncopied {
  background: var(--uncopied-bg);
  border-color: #fed7aa;
}
.entry.uncopied::before {
  content: "";
  position: absolute;
  left: 18px;
  top: 24px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.18);
}
.entry.uncopied.editing::before { display: none; }
@media (prefers-color-scheme: dark) {
  .entry.uncopied { border-color: rgba(251, 146, 60, 0.25); }
}
.entry.editing {
  grid-template-columns: 1fr;
  align-items: stretch;
  padding: 14px;
}
.entry-time {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  letter-spacing: 0;
  text-align: right;
}
.entry.uncopied .entry-time { color: var(--uncopied-accent); }
.entry-text {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  font-size: 15px;
  line-height: 1.45;
  letter-spacing: -0.005em;
  min-width: 0;
}
.entry-actions {
  display: flex;
  gap: 2px;
  align-items: center;
}

.btn-icon {
  background: transparent;
  border: none;
  color: var(--text-soft);
  cursor: pointer;
  padding: 0;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s, color 0.12s;
}
.btn-icon svg { display: block; }
.btn-icon:hover { background: rgba(15, 23, 42, 0.06); color: var(--text); }
@media (prefers-color-scheme: dark) {
  .btn-icon:hover { background: rgba(255,255,255,0.06); }
}
.btn-icon-danger:hover { background: var(--error-bg); color: var(--danger); }

.entry-edit { display: flex; flex-direction: column; gap: 10px; }
.edit-dt-row { display: flex; gap: 8px; }
.edit-dt-row .edit-datetime { flex: 1; min-width: 0; }
.edit-textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  /* 16px so iOS Safari doesn't auto-zoom on focus */
  font-size: 16px;
  background: var(--surface);
  color: var(--text);
  resize: vertical;
  min-height: 80px;
  outline: none;
  font-family: inherit;
  letter-spacing: -0.005em;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.edit-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.06); }
.edit-datetime {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  font-size: 16px;
  color: var(--text);
  outline: none;
  font-variant-numeric: tabular-nums;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.edit-datetime:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.06); }
.edit-actions { display: flex; gap: 8px; align-items: center; }
.edit-note {
  font-size: 12px;
  color: var(--text-soft);
}
.btn-delete-square {
  background: var(--danger);
  color: white;
  width: 40px;
  height: 40px;
  min-width: 40px;
  padding: 0;
  border-radius: var(--radius-md);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border: none;
  cursor: pointer;
  transition: background 0.12s, transform 0.05s, box-shadow 0.12s;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 1px 3px rgba(220, 38, 38, 0.25);
}
.btn-delete-square:hover { background: var(--danger-hover); box-shadow: 0 4px 12px -2px rgba(220, 38, 38, 0.4); }
.btn-delete-square:active { transform: scale(0.96); }
.btn-delete-square svg { display: block; }

.empty {
  text-align: center;
  color: var(--text-muted);
  padding: 56px 20px;
  font-size: 14px;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius-lg);
  letter-spacing: -0.005em;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
  animation: fade-in 0.15s ease;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
.modal-overlay.hidden { display: none; }
.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);

<body>

<header class="header">

  <div id="banners" class="banners-container"></div>

    <div class="capture-row">

      <button id="more-btn" class="btn btn-secondary btn-icon-only" aria-label="More actions">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>

  <div id="modal-content" class="modal-content"></div>

<div id="toasts" class="toasts-container"></div>

<script>
'use strict';

// ============================================================================
// App icon (96x96 PNG, base64-embedded so it renders in every context —
// preview panel, file://, served. Wired to the favicon, the apple-touch-icon,
// and the brand mark in the header.)
// ============================================================================

// ============================================================================
// Constants
// ============================================================================
const SCHEMA_VERSION = 1;
const DB_NAME = 'tracker';
const DB_VERSION = 1;
const KV_STORE = 'kv';
const SNAP_STORE = 'snapshots';
const DATA_KEY = 'data';
const LS_DATA_KEY = 'tracker.data.v1';
const MAX_SNAPSHOTS = 15;
const SNAPSHOT_MIN_INTERVAL_MS = 10 * 60 * 1000; // 10 minutes
const SNAPSHOT_LOAD_AGE_MS = 60 * 60 * 1000;     // 1 hour
const UNCOPIED_BANNER_THRESHOLD = 30; // uncopied entries before the "back up" nag shows
// Chips can be single-line ("Chole" — label and inserted text are both "Chole")
// or multi-line, in which case the first line is what's shown on the chip and
// the remaining lines are what's inserted into the entry field. This keeps the
// schema as `string[]` and lets any chip become a template later just by
// editing it.
const DEFAULT_CHIPS = [
  'Poo 💩\nPoop\nUrgency:\nVolume:\nConsistency:\nCompleteness:\nWipe:',
  'Chole',
  'Psyllium',
  'Coffee',
];

// ============================================================================
// Time / format helpers
// ============================================================================
const pad2 = (n) => String(n).padStart(2, '0');

function generateId() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
}

function nowISO() { return new Date().toISOString(); }

// Split a chip string into { label, inject }. Single-line chips have the same
// value for both. Multi-line chips: first line is the chip's label, the rest is
// the template that gets inserted into the entry field.
function chipLabelAndInject(chip) {
  if (typeof chip !== 'string') return null;
  const nl = chip.indexOf('\n');
  if (nl === -1) {
    const t = chip.trim();
    return t ? { label: t, inject: t } : null;
  }
  const label = chip.slice(0, nl).trim();
  const inject = chip.slice(nl + 1);
  return label ? { label, inject } : null;
}

function toDateInput(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
}

function toTimeInput(iso) {
  const d = new Date(iso);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function fromDateAndTime(dateStr, timeStr) {
  // dateStr: YYYY-MM-DD, timeStr: HH:MM — both local
  if (!dateStr || !timeStr) return null;
  const d = new Date(`${dateStr}T${timeStr}`);
  if (isNaN(d.getTime())) return null;
  return d.toISOString();
}

function formatExportTimestamp(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function formatTimeOfDay(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

function localDateKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
}

function formatDayHeader(dateKey) {
  const [y, m, dd] = dateKey.split('-').map(Number);
  const date = new Date(y, m - 1, dd);
  const today = new Date();
  const yesterday = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1);
  const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

  if (sameDay(date, today)) return 'Today';
  if (sameDay(date, yesterday)) return 'Yesterday';

  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  if (date.getFullYear() !== today.getFullYear()) opts.year = 'numeric';
  return date.toLocaleDateString(undefined, opts);
}

function backupFilename() {
  const d = new Date();
  return `tracker-backup-${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}T${pad2(d.getHours())}${pad2(d.getMinutes())}.json`;
}

// ============================================================================
// IndexedDB layer (thin promise wrappers)
// ============================================================================
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) {
      reject(new Error('IndexedDB not available'));
      return;
    }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(KV_STORE)) d.createObjectStore(KV_STORE, { keyPath: 'key' });
      if (!d.objectStoreNames.contains(SNAP_STORE)) d.createObjectStore(SNAP_STORE, { keyPath: 'timestamp' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IndexedDB open failed'));
    req.onblocked = () => reject(new Error('IndexedDB blocked'));
  });
}

function requireDB() {
  if (!db) throw new Error('IndexedDB unavailable');
}

function idbGet(store, key) {
  return new Promise((resolve, reject) => {
    requireDB();
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function idbPut(store, value) {
  return new Promise((resolve, reject) => {
    requireDB();
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function idbGetAll(store) {
  return new Promise((resolve, reject) => {
    requireDB();
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function idbDelete(store, key) {
  return new Promise((resolve, reject) => {
    requireDB();
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ============================================================================
// Data validation + migration
// ============================================================================
function isValidEntry(e) {
  return e && typeof e === 'object'
    && typeof e.id === 'string' && e.id.length > 0
    && typeof e.text === 'string'
    && typeof e.timestamp === 'string' && !isNaN(new Date(e.timestamp).getTime())
    && typeof e.exported === 'boolean';
}

function isValidData(d) {
  if (!d || typeof d !== 'object') return false;
  if (typeof d.schemaVersion !== 'number') return false;
  if (!Array.isArray(d.entries)) return false;
  if (!Array.isArray(d.chips)) return false;
  if (!d.meta || typeof d.meta !== 'object') return false;
  if (!d.entries.every(isValidEntry)) return false;
  if (!d.chips.every((c) => typeof c === 'string')) return false;
  return true;
}

function newEmptyData() {
  return {
    schemaVersion: SCHEMA_VERSION,
    entries: [],
    chips: [...DEFAULT_CHIPS],
    meta: { lastBackupAt: null, entryCountAtLastBackup: 0, hasSeeded: false },
    // Tombstones for entries that were exported in a prior batch and then
    // deleted locally. Flushed (and cleared) by the next copy-since-last-export
    // so the downstream AI can drop them from its records.
    pendingDeletions: [],
  };
}

// Demo entries, only seeded when the list is empty on first load — gives a
// new user something to visualize instead of an empty state. Entries are
// real and editable/deletable like any others.
function seedDummyData(data) {
  const nowMs = Date.now();
  const atOffset = (hours) => new Date(nowMs - hours * 60 * 60 * 1000).toISOString();
  const seeds = [
    { offset: 0.4,  text: "Stomach feels a little crampy",                            exported: false },
    { offset: 1.2,  text: "Coffee, half a cup",                                       exported: false },
    { offset: 3.5,  text: "Lunch: chicken bowl with rice and greens",                 exported: false },
    { offset: 5.0,  text: "Psyllium with water",                                      exported: true  },
    { offset: 5.2,  text: "Chole",                                                    exported: true  },
    { offset: 22.0, text: "Felt good through the afternoon. No urgency.",             exported: true  },
    { offset: 25.5, text: "Dinner: pasta with olive oil, simple side salad",          exported: true  },
    { offset: 29.0, text: "Chole + Psyllium together before bed",                     exported: true  },
    { offset: 30.5, text: "Coffee",                                                   exported: true  },
    { offset: 49.0, text: "Mild headache, drank water and it passed",                 exported: true  },
    { offset: 53.0, text: "Psyllium",                                                 exported: true  },
    { offset: 54.5, text: "Chole",                                                    exported: true  },
  ];
  for (let i = 0; i < seeds.length; i++) {
    const s = seeds[i];
    const ts = atOffset(s.offset);
    data.entries.push({
      id: 'seed-' + i + '-' + Math.random().toString(36).slice(2, 6),
      text: s.text,
      timestamp: ts,
      exported: s.exported,
      createdAt: ts,
      updatedAt: ts,
    });
  }
}

// Non-destructive migration. Future migrations should:
//   1) read the old shape,
//   2) write into a NEW versioned key,
//   3) leave the old key in place for a while as a fallback.
function migrate(raw) {
  if (!raw || typeof raw !== 'object') return null;
  // Defensive parse: build a clean object, never trust shape.
  const data = {
    schemaVersion: typeof raw.schemaVersion === 'number' ? raw.schemaVersion : 1,
    entries: Array.isArray(raw.entries) ? raw.entries.filter(isValidEntry) : [],
    chips: Array.isArray(raw.chips) ? raw.chips.filter((c) => typeof c === 'string') : [...DEFAULT_CHIPS],
    meta: (raw.meta && typeof raw.meta === 'object') ? {
      lastBackupAt: typeof raw.meta.lastBackupAt === 'string' ? raw.meta.lastBackupAt : null,
      entryCountAtLastBackup: typeof raw.meta.entryCountAtLastBackup === 'number' ? raw.meta.entryCountAtLastBackup : 0,
      hasSeeded: raw.meta.hasSeeded === true,
    } : { lastBackupAt: null, entryCountAtLastBackup: 0, hasSeeded: false },
    pendingDeletions: Array.isArray(raw.pendingDeletions)
      ? raw.pendingDeletions.filter((t) => t && typeof t === 'object' && typeof t.timestamp === 'string')
      : [],
  };
  // Future: if (data.schemaVersion < 2) { ...transform... ; data.schemaVersion = 2; }
  if (data.schemaVersion < SCHEMA_VERSION) data.schemaVersion = SCHEMA_VERSION;
  return data;
}

// ============================================================================
// Reconciliation between IDB (primary) and localStorage (secondary)
// ============================================================================
function reconcile(primary, secondary) {
  if (!primary && !secondary) return { data: null, source: 'none', note: null };
  if (primary && !secondary) return { data: primary, source: 'idb-only', note: null };
  if (!primary && secondary) {
    return { data: secondary, source: 'ls-only', note: 'IndexedDB was empty — restored from localStorage backup copy. Re-syncing.' };
  }

  const p = primary.entries.length;
  const s = secondary.entries.length;
  if (p > s) return { data: primary, source: 'idb', note: null };
  if (s > p) return { data: secondary, source: 'ls', note: `localStorage had ${s} entries vs IndexedDB's ${p}. Using localStorage.` };

  const latest = (entries) => Math.max(0, ...entries.map((e) => new Date(e.updatedAt || e.timestamp).getTime()));
  const pLatest = latest(primary.entries);
  const sLatest = latest(secondary.entries);
  if (pLatest >= sLatest) return { data: primary, source: 'idb', note: null };
  return { data: secondary, source: 'ls', note: 'localStorage was more recent than IndexedDB. Using localStorage and re-syncing.' };
}

// ============================================================================
// In-memory state
// ============================================================================
const state = {
  data: null,
  editingId: null,
  deletingId: null,
  storagePersistent: null,
  lastSnapshotTime: 0,
  previewMode: false, // true when storage is unavailable (e.g. data: URL preview)
};

// Detect contexts where the browser blocks storage entirely.
// data:/blob: URLs (preview panels) and some sandboxed iframes throw on any
// storage access, so probe localStorage to confirm.
function detectStorageAvailability() {
  const ephemeral = location.protocol === 'data:' || location.protocol === 'blob:';
  let lsOk = false;
  try {
    const k = '__tracker_probe__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    lsOk = true;
  } catch (_) { /* blocked */ }
  let idbOk = 'indexedDB' in window;
  // openDB() will confirm idb actually works; this is the cheap pre-check
  return { ephemeral, lsOk, idbOk };
}

// ============================================================================
// Save flow — validate, then commit. Bad writes never overwrite good data.
// ============================================================================
let lastGoodSerialized = null;

async function save({ snapshot = true } = {}) {
  if (!state.data) return false;

  let serialized;
  try {
    serialized = JSON.stringify(state.data);
  } catch (e) {
    notify('Save aborted: data could not be serialized.', 'error');
    return false;
  }

  let reparsed;
  try {
    reparsed = JSON.parse(serialized);
  } catch (e) {
    notify('Save aborted: re-parse failed. Previous good copy preserved.', 'error');
    return false;
  }

  if (!isValidData(reparsed)) {
    notify('Save aborted: data failed validation. Previous good copy preserved.', 'error');
    return false;
  }

  let idbOk = false;
  if (db) {
    try {
      await idbPut(KV_STORE, { key: DATA_KEY, value: reparsed });
      idbOk = true;
    } catch (e) {
      console.error('IDB write failed', e);
      notify("Couldn't save to primary storage. Trying backup copy instead.", 'warn');
    }
  }

  let lsOk = false;
  if (!state.previewMode) {
    try {
      localStorage.setItem(LS_DATA_KEY, serialized);
      lsOk = true;
    } catch (e) {
      console.error('LS write failed', e);
      if (e && e.name === 'QuotaExceededError') {
        notify("You're out of storage space. Back up and consider trimming older entries.", 'error');
      } else {
        notify("Couldn't save to backup storage.", 'warn');
      }
    }
  }

  if (!idbOk && !lsOk) {
    if (state.previewMode) {
      // Storage is intentionally unavailable in preview contexts (data: URL,
      // sandboxed iframe, etc.). The in-memory change is still valid for this
      // session — pretend the write succeeded so callers don't roll back the
      // change the user just made and leave the UI looking frozen.
      lastGoodSerialized = serialized;
      return true;
    }
    notify("Couldn't save anywhere. Your latest change wasn't saved. Back up now from another device.", 'error');
    return false;
  }

  lastGoodSerialized = serialized;

  if (snapshot) maybeSnapshot(reparsed);

  return true;
}

// ============================================================================
// Snapshots (rolling, in IndexedDB)
// ============================================================================
async function takeSnapshot(data) {
  if (!db) return;
  const snap = { timestamp: nowISO(), data };
  try {
    await idbPut(SNAP_STORE, snap);
    state.lastSnapshotTime = Date.now();
    const all = await idbGetAll(SNAP_STORE);
    all.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
    for (let i = MAX_SNAPSHOTS; i < all.length; i++) {
      await idbDelete(SNAP_STORE, all[i].timestamp);
    }
  } catch (e) {
    console.error('Snapshot failed', e);
  }
}

async function maybeSnapshot(data) {
  const now = Date.now();
  if (now - state.lastSnapshotTime < SNAPSHOT_MIN_INTERVAL_MS) return;
  await takeSnapshot(data);
}

async function ensureInitialSnapshot(data) {
  if (!db || !data || data.entries.length === 0) return;
  try {
    const all = await idbGetAll(SNAP_STORE);
    if (all.length === 0) {
      await takeSnapshot(data);
      return;
    }
    all.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
    const latest = new Date(all[0].timestamp).getTime();
    state.lastSnapshotTime = latest;
    if (Date.now() - latest > SNAPSHOT_LOAD_AGE_MS) {
      await takeSnapshot(data);
    }
  } catch (e) {
    console.error(e);
  }
}

// ============================================================================
// Load + recovery chain
// ============================================================================
async function loadData() {
  let primary = null, secondary = null;
  let primaryRawExisted = false, secondaryRawExisted = false;

  if (db) {
    try {
      const rec = await idbGet(KV_STORE, DATA_KEY);
      if (rec && rec.value) {
        primaryRawExisted = true;
        const migrated = migrate(rec.value);
        if (isValidData(migrated)) primary = migrated;
        else showBanner("Your saved data looked corrupted. Trying the backup copy instead.", 'warn');
      }
    } catch (_) { /* upfront storage check already informed the user */ }
  }

  try {
    const raw = localStorage.getItem(LS_DATA_KEY);
    if (raw) {
      secondaryRawExisted = true;
      const parsed = JSON.parse(raw);
      const migrated = migrate(parsed);
      if (isValidData(migrated)) secondary = migrated;
      else showBanner("Your backup copy looked corrupted. Trying older snapshots.", 'warn');
    }
  } catch (_) { /* upfront storage check already informed the user */ }

  const reconciled = reconcile(primary, secondary);
  if (reconciled.note) showBanner(reconciled.note, 'info');
  if (reconciled.data) return { data: reconciled.data, source: reconciled.source };

  // Both stores empty / unreadable — try snapshots
  if (db) {
    try {
      const snaps = await idbGetAll(SNAP_STORE);
      if (snaps.length > 0) {
        snaps.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
        for (const s of snaps) {
          const m = migrate(s.data);
          if (isValidData(m)) {
            showBanner(`Recovered from snapshot taken ${new Date(s.timestamp).toLocaleString()}. Verify your data and back up.`, 'warn');
            return { data: m, source: 'snapshot' };
          }
        }
      }
    } catch (e) {
      console.error(e);
    }
  }

  if (primaryRawExisted || secondaryRawExisted) {
    showBanner('Stored data was corrupt and unrecoverable. Use Restore to load a backup file before adding anything.', 'error');
  }
  return { data: newEmptyData(), source: 'empty' };
}

// ============================================================================
// UI: rendering
// ============================================================================
function render() {
  renderChips();
  renderActions();
  renderEntries();
  renderBackupBanner();
  updateStatusIndicator();
}

function renderChips() {
  const row = document.getElementById('chips-row');
  row.innerHTML = '';
  for (const rawChip of state.data.chips) {
    const parsed = chipLabelAndInject(rawChip);
    if (!parsed) continue;
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = parsed.label;
    btn.addEventListener('click', () => injectChip(parsed.inject));
    row.appendChild(btn);
  }
  const edit = document.createElement('button');
  edit.className = 'chip chip-edit';
  edit.type = 'button';
  edit.textContent = 'Edit chips';
  edit.addEventListener('click', openChipsEditor);
  row.appendChild(edit);
}

function renderActions() {
  const uncopied = state.data.entries.filter((e) => !e.exported).length;
  const deletions = Array.isArray(state.data.pendingDeletions) ? state.data.pendingDeletions.length : 0;
  const total = uncopied + deletions;
  const btn = document.getElementById('copy-since-btn');
  btn.innerHTML = total > 0
    ? `Copy since last export <span class="copy-count">${total}</span>`
    : `Copy since last export`;
  btn.title = deletions > 0 ? `${uncopied} new ${uncopied === 1 ? 'entry' : 'entries'}, ${deletions} ${deletions === 1 ? 'deletion' : 'deletions'}` : '';
  btn.disabled = total === 0;
}

function renderEntries() {
  const container = document.getElementById('entries-container');
  container.innerHTML = '';

  if (state.data.entries.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No entries yet. Add one above.';
    container.appendChild(empty);
    return;
  }

  const sorted = [...state.data.entries].sort((a, b) => b.timestamp.localeCompare(a.timestamp));
  const groups = new Map();
  for (const e of sorted) {
    const key = localDateKey(e.timestamp);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(e);
  }

  for (const [key, entries] of groups) {
    const groupEl = document.createElement('section');
    groupEl.className = 'day-group';

    const header = document.createElement('div');
    header.className = 'day-header';
    const title = document.createElement('span');
    title.className = 'day-title';
    title.textContent = formatDayHeader(key);
    const meta = document.createElement('span');
    meta.className = 'day-meta';
    const uncopiedCount = entries.filter((e) => !e.exported).length;
    meta.textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}` + (uncopiedCount ? ` · ${uncopiedCount} new` : '');
    header.appendChild(title);
    header.appendChild(meta);
    groupEl.appendChild(header);

    for (const e of entries) groupEl.appendChild(renderEntry(e));
    container.appendChild(groupEl);
  }
}

function renderBackupBanner() {
  let existing = document.getElementById('backup-banner');
  if (existing) existing.remove();

  const uncopied = state.data.entries.filter((e) => !e.exported).length;
  const deletions = Array.isArray(state.data.pendingDeletions) ? state.data.pendingDeletions.length : 0;
  const pending = uncopied + deletions;
  if (pending < UNCOPIED_BANNER_THRESHOLD) return;

  const banner = document.createElement('div');
  banner.id = 'backup-banner';
  banner.className = 'banner banner-warn';
  banner.innerHTML = `
    <span class="banner-text"></span>
    <span class="banner-actions">
      <button class="btn btn-small btn-primary">Back up</button>
      <button class="banner-dismiss">Later</button>
    </span>
  `;
  banner.querySelector('.banner-text').textContent = deletions > 0
    ? `${uncopied} new + ${deletions} deleted — back up now?`
    : `${uncopied} uncopied ${uncopied === 1 ? 'entry' : 'entries'} — back up now?`;
  // "Back up" on this banner == copy since last export (the user's effective
  // backup is sending uncopied entries downstream to their AI).
  banner.querySelector('.btn-primary').addEventListener('click', () => {
    banner.remove();
    copySinceLastExport();
  });
  banner.querySelector('.banner-dismiss').addEventListener('click', () => banner.remove());

  const container = document.getElementById('banners');
  container.appendChild(banner);
}

// ============================================================================
// Capture / Add
// ============================================================================
async function addEntry() {
  const ta = document.getElementById('entry-textarea');
  const dateEl = document.getElementById('entry-date');
  const timeEl = document.getElementById('entry-time');

  const text = ta.value.trim();
  if (!text) { ta.focus(); return; }

  const tsIso = fromDateAndTime(dateEl.value, timeEl.value) || nowISO();
  if (!tsIso) { notify('Invalid date/time.', 'warn'); return; }

  const now = nowISO();
  const entry = { id: generateId(), text, timestamp: tsIso, exported: false, createdAt: now, updatedAt: now };

  state.data.entries.push(entry);
  const ok = await save();
  if (!ok) {
    state.data.entries.pop();
    return;
  }

  ta.value = '';
  ta.style.height = '';
  const cur = nowISO();
  dateEl.value = toDateInput(cur);
  timeEl.value = toTimeInput(cur);
  const nowBtn = document.getElementById('entry-now-btn');
  if (nowBtn) nowBtn.classList.add('hidden');
  render();
  ta.focus();
}

// ============================================================================
// Edit / Delete
// ============================================================================
function startEntryEdit(id) {
  state.editingId = id;
  render();
}

function cancelEntryEdit() {
  state.editingId = null;
  render();
}

async function saveEntryEdit(id, newText, newDate, newTime) {
  const entry = state.data.entries.find((e) => e.id === id);
  if (!entry) return;

  const trimmed = newText.trim();
  if (!trimmed) { notify('Entry text cannot be empty.', 'warn'); return; }

  const newTs = (newDate && newTime) ? fromDateAndTime(newDate, newTime) : entry.timestamp;
  if (!newTs) { notify('Invalid date/time.', 'warn'); return; }

  const prev = {
    text: entry.text,
    timestamp: entry.timestamp,
    exported: entry.exported,
    updatedAt: entry.updatedAt,
    wasEditedAfterExport: entry.wasEditedAfterExport,
  };
  const wasExported = entry.exported === true;
  entry.text = trimmed;
  entry.timestamp = newTs;
  entry.exported = false;
  entry.updatedAt = nowISO();
  // If this entry was already exported, flag it as a revision so the next
  // copy-since-last-export includes an explicit instruction to the downstream
  // AI to replace the prior version. lastExportedTimestamp (set during the
  // earlier export) is intentionally left unchanged — it's the key the AI uses
  // to find the prior entry when the user has also moved the timestamp.
  if (wasExported || entry.wasEditedAfterExport) entry.wasEditedAfterExport = true;

  const ok = await save();
  if (!ok) {
    Object.assign(entry, prev);
    return;
  }

  state.editingId = null;
  render();
}

function confirmDeleteEntry(id) {
  state.deletingId = id;
  const entry = state.data.entries.find((e) => e.id === id);
  if (!entry) return;
  const preview = entry.text.length > 80 ? entry.text.slice(0, 80) + '…' : entry.text;
  openModal(`
    <h3>Delete this entry?</h3>
    <p class="modal-help">This cannot be undone. A snapshot is taken automatically so recent deletes can be rolled back from Snapshots.</p>
    <div style="background: var(--surface-2); border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 8px;"><strong style="display:block; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">${formatExportTimestamp(entry.timestamp)}</strong><span></span></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancel-delete-btn">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  `);
  document.querySelector('#modal-content div span').textContent = preview;
  document.getElementById('confirm-delete-btn').addEventListener('click', deleteEntry);
  document.getElementById('cancel-delete-btn').addEventListener('click', closeModal);
}

async function deleteEntry() {
  const id = state.deletingId;
  if (!id) return;
  const idx = state.data.entries.findIndex((e) => e.id === id);
  if (idx < 0) { closeModal(); return; }

  const entry = state.data.entries[idx];

  // If this entry was already delivered downstream (exported, or edited after
  // being exported), record a tombstone so the next copy-since-last-export
  // tells the AI to remove it from its records. Use the timestamp the AI
  // actually saw (lastExportedTimestamp) — the user may have edited the
  // timestamp since.
  const wasDelivered = entry.exported === true || entry.wasEditedAfterExport === true;
  let pushedTombstone = false;
  if (wasDelivered) {
    if (!Array.isArray(state.data.pendingDeletions)) state.data.pendingDeletions = [];
    state.data.pendingDeletions.push({
      timestamp: entry.lastExportedTimestamp || entry.timestamp,
      deletedAt: nowISO(),
    });
    pushedTombstone = true;
  }

  // Take a snapshot before destructive change
  await takeSnapshot(JSON.parse(JSON.stringify(state.data)));

  const removed = state.data.entries.splice(idx, 1)[0];
  const ok = await save({ snapshot: false });
  if (!ok) {
    state.data.entries.splice(idx, 0, removed);
    if (pushedTombstone) state.data.pendingDeletions.pop();
    return;
  }
  state.deletingId = null;
  closeModal();
  render();
  notify('Entry deleted.');
}

// ============================================================================
// Chips
// ============================================================================
function injectChip(chipText) {
  const ta = document.getElementById('entry-textarea');
  const current = ta.value;
  const isMultiline = chipText.includes('\n');
  let prefix = '';
  if (current) {
    prefix = isMultiline
      ? (current.endsWith('\n') ? '' : '\n')
      : (/\s$/.test(current) ? '' : ' ');
  }
  const suffix = isMultiline ? '' : ' ';
  ta.value = current + prefix + chipText + suffix;
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  autoResize(ta);
}

function openChipsEditor() {
  let chips = [...state.data.chips];
  openModal(`
    <h3>Edit quick-add chips</h3>
    <p class="modal-help">Drag the grip to reorder. Single-line chips insert their own text. For a template, put the chip's label on the first line and the text it should insert on the lines below — the label is the only part shown on the chip.</p>
    <div class="chips-editor" id="chips-editor"></div>
    <button class="btn btn-secondary" id="add-chip-btn">Add chip</button>
    <div class="modal-actions">
      <button class="btn btn-tertiary" id="cancel-chips-btn">Cancel</button>
      <button class="btn btn-primary" id="save-chips-btn">Done</button>
    </div>
  `);

  // Sync `chips` from the live DOM order — input values are the source of truth
  // while the modal is open (the user may be typing into a row right now).
  function syncFromDOM() {
    const editor = document.getElementById('chips-editor');
    const rows = editor.querySelectorAll('.chip-edit-row');
    chips = Array.from(rows).map((r) => r.querySelector('.chip-input').value);
  }

  function renderEditor() {
    const editor = document.getElementById('chips-editor');
    editor.innerHTML = '';
    chips.forEach((chip) => editor.appendChild(buildRow(chip)));
    if (chips.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color: var(--text-muted); font-size: 13px; padding: 8px 4px;';
      empty.textContent = 'No chips yet. Add one below.';
      editor.appendChild(empty);
    }
  }

  function buildRow(text) {
    const row = document.createElement('div');
    row.className = 'chip-edit-row';

    const handle = document.createElement('button');
    handle.type = 'button';
    handle.className = 'chip-drag-handle';
    handle.setAttribute('aria-label', 'Drag to reorder');
    handle.title = 'Drag to reorder';
    handle.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>';
    attachDrag(handle, row);

    const input = document.createElement('textarea');
    input.className = 'chip-input';
    input.value = text;
    input.placeholder = 'chip text (multi-line = template)';
    input.rows = 1;
    input.spellcheck = false;
    const fit = () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    };
    input.addEventListener('input', fit);
    // Defer to next frame so the row is in the DOM and scrollHeight is correct.
    requestAnimationFrame(fit);

    const remove = document.createElement('button');
    remove.type = 'button';
    remove.className = 'btn btn-tertiary chip-remove-btn';
    remove.setAttribute('aria-label', 'Remove chip');
    remove.title = 'Remove';
    remove.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    remove.addEventListener('click', () => {
      syncFromDOM();
      const idx = Array.from(document.getElementById('chips-editor').children).indexOf(row);
      if (idx >= 0) chips.splice(idx, 1);
      renderEditor();
    });

    row.appendChild(handle);
    row.appendChild(input);
    row.appendChild(remove);
    return row;
  }

  // Pointer-based drag-to-reorder. Works on mouse, touch, and pen.
  function attachDrag(handle, row) {
    handle.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      const editor = document.getElementById('chips-editor');
      handle.setPointerCapture(e.pointerId);
      row.classList.add('dragging');
      document.body.style.userSelect = 'none';

      const onMove = (ev) => {
        const y = ev.clientY;
        const rows = Array.from(editor.querySelectorAll('.chip-edit-row'));
        for (const sib of rows) {
          if (sib === row) continue;
          const rect = sib.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          const rowRect = row.getBoundingClientRect();
          if (y < mid && rowRect.top > rect.top) {
            editor.insertBefore(row, sib);
            return;
          }
          if (y >= mid && rowRect.top < rect.top) {
            editor.insertBefore(row, sib.nextSibling);
            return;
          }
        }
      };

      const onEnd = () => {
        row.classList.remove('dragging');
        document.body.style.userSelect = '';
        try { handle.releasePointerCapture(e.pointerId); } catch (_) {}
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onEnd);
        handle.removeEventListener('pointercancel', onEnd);
        syncFromDOM();
      };

      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onEnd);
      handle.addEventListener('pointercancel', onEnd);
    });
  }

  renderEditor();

  document.getElementById('add-chip-btn').addEventListener('click', () => {
    syncFromDOM();
    chips.push('');
    renderEditor();
    const editor = document.getElementById('chips-editor');
    const inputs = editor.querySelectorAll('input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });
  document.getElementById('cancel-chips-btn').addEventListener('click', closeModal);
  document.getElementById('save-chips-btn').addEventListener('click', async () => {
    syncFromDOM();
    const clean = chips.map((c) => c.trim()).filter((c) => c.length > 0);
    const prev = state.data.chips;
    state.data.chips = clean;
    const ok = await save();
    if (!ok) { state.data.chips = prev; return; }
    closeModal();
    render();
  });
}

// ============================================================================
// Copy / Export
// ============================================================================
function buildExportText(entries, deletions = []) {
  // Oldest first for chronological reading; one entry per line with [YYYY-MM-DD HH:MM] prefix.
  // Newlines inside an entry are preserved — parsers can split on /^\[\d{4}/m.
  const sorted = [...entries].sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  const hasRevisions = sorted.some((e) => e.wasEditedAfterExport);
  const hasDeletions = Array.isArray(deletions) && deletions.length > 0;

  const entryLines = sorted.map((e) => {
    const ts = formatExportTimestamp(e.timestamp);
    if (!e.wasEditedAfterExport) return `[${ts}] ${e.text}`;
    const tsChanged = e.lastExportedTimestamp && e.lastExportedTimestamp !== e.timestamp;
    const note = tsChanged
      ? `{REVISION — replaces the previously exported entry at [${formatExportTimestamp(e.lastExportedTimestamp)}]}`
      : `{REVISION — replaces any previously exported entry at this same timestamp}`;
    return `[${ts}] ${note} ${e.text}`;
  });

  const deletionLines = hasDeletions
    ? [...deletions]
        .sort((a, b) => a.timestamp.localeCompare(b.timestamp))
        .map((d) => `[${formatExportTimestamp(d.timestamp)}] {DELETED — remove the previously exported entry at this timestamp from your records}`)
    : [];

  const allLines = [...entryLines, ...deletionLines];

  if (hasRevisions || hasDeletions) {
    const header = ['# INSTRUCTIONS FOR THE READING ASSISTANT'];
    if (hasRevisions) {
      header.push(
        '# Lines marked {REVISION ...} are corrected versions of entries you have already',
        '# received in a previous export. For each {REVISION} line, locate the prior entry',
        '# it identifies (by the timestamp inside the note, or by the line\'s own timestamp',
        '# if no prior timestamp is given) and OVERWRITE that prior entry with this version.',
        '# Do not keep both copies; the {REVISION} line is the source of truth.',
      );
    }
    if (hasDeletions) {
      header.push(
        '# Lines marked {DELETED ...} identify entries that were sent to you in a previous',
        '# export and have since been deleted by the user. For each {DELETED} line, locate',
        '# the prior entry at the timestamp shown and REMOVE IT ENTIRELY from your records.',
        '# Do not keep a copy and do not treat it as a new entry.',
      );
    }
    header.push('');
    return [...header, ...allLines].join('\n');
  }
  return allLines.join('\n');
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      ta.style.pointerEvents = 'none';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e2) {
      return false;
    }
  }
}

async function copySinceLastExport() {
  const uncopied = state.data.entries.filter((e) => !e.exported);
  const pendingDeletions = Array.isArray(state.data.pendingDeletions) ? state.data.pendingDeletions : [];
  if (uncopied.length === 0 && pendingDeletions.length === 0) {
    notify('Nothing new to copy.');
    return;
  }

  const text = buildExportText(uncopied, pendingDeletions);
  const ok = await copyText(text);
  if (!ok) { notify('Copy to clipboard failed.', 'error'); return; }

  const backup = uncopied.map((e) => ({
    id: e.id,
    exported: e.exported,
    updatedAt: e.updatedAt,
    wasEditedAfterExport: e.wasEditedAfterExport,
    lastExportedTimestamp: e.lastExportedTimestamp,
  }));
  const backupDeletions = pendingDeletions.slice();
  const now = nowISO();
  for (const e of state.data.entries) {
    if (!e.exported) {
      e.exported = true;
      e.updatedAt = now;
      // The revision has now been delivered downstream. Reset the flag and
      // record this timestamp as the one the AI now knows about, so a future
      // edit can correctly reference "the entry previously exported at X".
      e.wasEditedAfterExport = false;
      e.lastExportedTimestamp = e.timestamp;
    }
  }
  // Deletions have now been delivered — the AI will remove them from its
  // records, so we no longer need to track them locally.
  state.data.pendingDeletions = [];

  const saved = await save();
  if (!saved) {
    for (const b of backup) {
      const e = state.data.entries.find((x) => x.id === b.id);
      if (e) {
        e.exported = b.exported;
        e.updatedAt = b.updatedAt;
        e.wasEditedAfterExport = b.wasEditedAfterExport;
        e.lastExportedTimestamp = b.lastExportedTimestamp;
      }
    }
    state.data.pendingDeletions = backupDeletions;
    return;
  }
  const parts = [];
  if (uncopied.length) parts.push(`${uncopied.length} ${uncopied.length === 1 ? 'entry' : 'entries'}`);
  if (pendingDeletions.length) parts.push(`${pendingDeletions.length} ${pendingDeletions.length === 1 ? 'deletion' : 'deletions'}`);
  notify(`Copied ${parts.join(' + ')} and marked as exported.`, 'ok');
  render();
}

async function copyAll() {
  if (state.data.entries.length === 0) { notify('No entries to copy.'); return; }

}

function openCopyRange() {
  const t = new Date();
  const fmt = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
  openModal(`
    <h3>Copy custom range</h3>
    <label class="form-row"><span>From</span><input type="date" id="range-start" value="${fmt(t)}"></label>
    <label class="form-row"><span>To</span><input type="date" id="range-end" value="${fmt(t)}"></label>
    <div class="range-presets">
      <button type="button" class="btn btn-tertiary" data-preset="today">Today</button>
      <button type="button" class="btn btn-tertiary" data-preset="yesterday">Yesterday</button>
      <button type="button" class="btn btn-tertiary" data-preset="7d">Last 7 days</button>
      <button type="button" class="btn btn-tertiary" data-preset="30d">Last 30 days</button>
    </div>
    <p class="modal-help">Inclusive range by calendar day (local time). Flags are not changed.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="range-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="range-copy-btn">Copy</button>
    </div>
  `);
  const startEl = document.getElementById('range-start');
  const endEl = document.getElementById('range-end');

  document.querySelectorAll('[data-preset]').forEach((b) => {
    b.addEventListener('click', () => {
      const t2 = new Date();
      if (b.dataset.preset === 'today') { startEl.value = endEl.value = fmt(t2); }
      else if (b.dataset.preset === 'yesterday') { const y = new Date(t2); y.setDate(y.getDate() - 1); startEl.value = endEl.value = fmt(y); }
      else if (b.dataset.preset === '7d') { const s = new Date(t2); s.setDate(s.getDate() - 6); startEl.value = fmt(s); endEl.value = fmt(t2); }
      else if (b.dataset.preset === '30d') { const s = new Date(t2); s.setDate(s.getDate() - 29); startEl.value = fmt(s); endEl.value = fmt(t2); }
    });
  });

  document.getElementById('range-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('range-copy-btn').addEventListener('click', async () => {
    const sv = startEl.value, ev = endEl.value;
    if (!sv || !ev) { notify('Pick both start and end dates.', 'warn'); return; }
    const startMs = new Date(sv + 'T00:00:00').getTime();
    const endMs = new Date(ev + 'T23:59:59.999').getTime();
    if (startMs > endMs) { notify('Start must be on or before end.', 'warn'); return; }

    const inRange = state.data.entries.filter((e) => {
      const ms = new Date(e.timestamp).getTime();
      return ms >= startMs && ms <= endMs;
    });
    if (inRange.length === 0) { notify('No entries in that range.'); return; }
    const text = buildExportText(inRange);
    const ok = await copyText(text);
    if (ok) { notify(`Copied ${inRange.length} ${inRange.length === 1 ? 'entry' : 'entries'} (flags unchanged).`, 'ok'); closeModal(); }
    else notify('Copy to clipboard failed.', 'error');
  });
}

function downloadFile(filename, content, mime = 'application/json') {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function backupToFile() {
  if (state.data.entries.length === 0) { notify('Nothing to back up yet.'); return; }
  const content = JSON.stringify(state.data, null, 2);
  downloadFile(backupFilename(), content);
  state.data.meta.lastBackupAt = nowISO();
  state.data.meta.entryCountAtLastBackup = state.data.entries.length;
  await save();
  notify('Backup file downloaded.', 'ok');
  render();
}

async function backupToClipboard() {
  if (state.data.entries.length === 0) { notify('Nothing to back up yet.'); return; }
  const content = JSON.stringify(state.data, null, 2);
  const ok = await copyText(content);
  if (!ok) { notify('Copy to clipboard failed.', 'error'); return; }
  state.data.meta.lastBackupAt = nowISO();
  state.data.meta.entryCountAtLastBackup = state.data.entries.length;
  await save();
  notify('Backup JSON copied to clipboard.', 'ok');
  render();
}

async function clearAllData() {
  // Safety net first: dump whatever's there to a JSON file so the user has
  // an off-ramp if they panic. If there's nothing to back up, skip the file.
  try {
    if (state.data.entries.length > 0) {
      const content = JSON.stringify(state.data, null, 2);
      downloadFile(backupFilename(), content);
    }
  } catch (e) {
    console.error('pre-clear backup download failed', e);
  }

  // Wipe IndexedDB snapshots too — keeping them defeats the "start fresh" intent.
  if (db) {
    try {
      const snaps = await idbGetAll(SNAP_STORE);
      for (const s of snaps) await idbDelete(SNAP_STORE, s.timestamp);
    } catch (e) { console.error('snapshot wipe failed', e); }
  }

  state.data = newEmptyData();
  // Mark as already-seeded so the demo entries don't return on next load.
  state.data.meta.hasSeeded = true;
  state.lastSnapshotTime = 0;

  const ok = await save({ snapshot: false });
  if (!ok) {
    notify('Clear failed — your data was not wiped.', 'error');
    return;
  }
  closeModal();
  render();
  notify('All data cleared. Starting fresh.', 'ok');
}

function openRestoreMenu() {
  openModal(`
    <h3>Restore from backup</h3>
    <p class="modal-help">Upload a backup file or paste JSON. Then choose Merge (dedupe by id, keep newest) or Replace (overwrite everything).</p>
    <div class="form-row"><span>File</span><input type="file" id="restore-file" accept="application/json,.json"></div>
    <textarea class="restore-textarea" id="restore-paste" placeholder="…or paste backup JSON here"></textarea>
    <div class="modal-actions stacked">
      <button class="btn btn-primary" id="restore-merge-btn">Merge (keep both, dedupe by id)</button>
      <button class="btn btn-danger" id="restore-replace-btn">Replace (overwrite current)</button>
      <button class="btn btn-tertiary" id="restore-cancel-btn">Cancel</button>
    </div>
  `);

  document.getElementById('restore-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      document.getElementById('restore-paste').value = text;
    } catch (err) {
      notify('File read failed: ' + (err.message || err), 'error');
    }
  });

  async function doRestore(mode) {
    const text = (document.getElementById('restore-paste').value || '').trim();
    if (!text) { notify('Paste backup JSON or upload a file first.', 'warn'); return; }

    let parsed;
    try { parsed = JSON.parse(text); }
    catch (e) { notify('Invalid JSON: ' + e.message, 'error'); return; }

    const migrated = migrate(parsed);
    if (!isValidData(migrated)) { notify('Backup is not a valid tracker dataset.', 'error'); return; }

    if (mode === 'replace') {
      if (!confirm(`Replace will overwrite ALL current data (${state.data.entries.length} entries) with ${migrated.entries.length} from the backup. Continue?`)) return;
      await takeSnapshot(JSON.parse(JSON.stringify(state.data)));
      const prev = state.data;
      state.data = migrated;
      const ok = await save({ snapshot: false });
      if (!ok) { state.data = prev; return; }
    } else {
      const prev = JSON.parse(JSON.stringify(state.data));
      await takeSnapshot(prev);

      const byId = new Map();
      for (const e of state.data.entries) byId.set(e.id, e);
      let added = 0, updated = 0;
      for (const e of migrated.entries) {
        const existing = byId.get(e.id);
        if (!existing) { byId.set(e.id, e); added++; }
        else {
          const eAt = new Date(e.updatedAt || e.timestamp).getTime();
          const exAt = new Date(existing.updatedAt || existing.timestamp).getTime();
          if (eAt > exAt) { byId.set(e.id, e); updated++; }
        }
      }
      state.data.entries = Array.from(byId.values());

      const chipSet = new Set(state.data.chips);
      for (const c of migrated.chips) chipSet.add(c);
      state.data.chips = Array.from(chipSet);

      const ok = await save({ snapshot: false });
      if (!ok) { state.data = prev; return; }
      notify(`Merged: ${added} new, ${updated} updated. ${state.data.entries.length} total.`, 'ok');
      closeModal();
      render();
      return;
    }

    notify(`Restored: ${state.data.entries.length} entries.`, 'ok');
    closeModal();
    render();
  }

  document.getElementById('restore-merge-btn').addEventListener('click', () => doRestore('merge'));
  document.getElementById('restore-replace-btn').addEventListener('click', () => doRestore('replace'));
  document.getElementById('restore-cancel-btn').addEventListener('click', closeModal);
}

      const prev = state.data;
      state.data = migrated;
      const ok = await save({ snapshot: false });
      if (!ok) { state.data = prev; return; }
      notify('Restored from snapshot.', 'ok');
      closeModal();
      render();
    });
  });
}

// ============================================================================
// Persistence status
// ============================================================================
function relativeTimeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 45 * 1000) return 'just now';
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  const months = Math.floor(days / 30);
  return months + 'mo ago';
}

// Header status indicator: a colored dot (data-safety signal) plus a short
// glanceable activity line ("Last entry 12m ago"). The title attribute carries
// the long-form persistence explanation that used to be the visible text.
function updateStatusIndicator() {
  const indicator = document.getElementById('persistence-status');
  if (!indicator || !state.data) return;

  let dotClass;
  let title;
  if (state.previewMode) {
    dotClass = 'dot-warn';
    title = "This window can't save anything — nothing you do persists. Open the app from a real URL (or open the file directly in your browser) to use it for real.";
  } else if (state.storagePersistent === true) {
    dotClass = 'dot-ok';
    title = "Your browser has promised not to evict this app's data under storage pressure.";
  } else {
    dotClass = 'dot-warn';
    title = "Your browser may delete this app's data under storage pressure or after a period of inactivity. Use Backup regularly.";
  }

  let text;
  if (state.previewMode) {
    text = 'Preview · changes lost on reload';
  } else if (!state.data.entries || state.data.entries.length === 0) {
    text = 'No entries yet';
  } else {
    let newestTs = '';
    for (const e of state.data.entries) {
      if (typeof e.timestamp === 'string' && e.timestamp > newestTs) newestTs = e.timestamp;
    }
    text = newestTs ? 'Last entry ' + relativeTimeAgo(newestTs) : 'No entries yet';
  }

  indicator.innerHTML = `<span class="dot ${dotClass}"></span> ${text}`;
  indicator.title = `${title}\n\n${state.data.entries.length} ${state.data.entries.length === 1 ? 'entry' : 'entries'} stored.`;
}

async function checkPersistence() {
  if (state.previewMode) { updateStatusIndicator(); return; }
  if (!navigator.storage || !navigator.storage.persisted) { updateStatusIndicator(); return; }
  let persisted = false;
  try {
    persisted = await navigator.storage.persisted();
    if (!persisted && navigator.storage.persist) {
      persisted = await navigator.storage.persist();
    }
  } catch (e) {
    console.error('persist() failed', e);
  }
  state.storagePersistent = persisted;
  updateStatusIndicator();
}

// ============================================================================
// Toast / Banner
// ============================================================================
function notify(msg, level = 'ok') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast toast-${level}`;
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));
  setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 250);
  }, 3800);
}

function showBanner(msg, level = 'warn') {
  const container = document.getElementById('banners');
  const el = document.createElement('div');
  el.className = `banner banner-${level}`;
  el.innerHTML = '<span class="banner-text"></span><button class="banner-dismiss">Dismiss</button>';
  el.querySelector('.banner-text').textContent = msg;
  el.querySelector('.banner-dismiss').addEventListener('click', () => el.remove());
  container.appendChild(el);
}

// ============================================================================
// Modal helpers
// ============================================================================
function openModal(html) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  content.innerHTML = html;
  overlay.classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-content').innerHTML = '';
  state.deletingId = null;
}

// ============================================================================
// Textarea auto-grow
// ============================================================================
function autoResize(textarea) {
  textarea.style.height = 'auto';
  // Generous cap — has to comfortably fit multi-line chip templates (Poo's
  // is 6 lines) without scrolling, and still leave room for an entry the
  // user fleshes out from there. Past this, the textarea internally scrolls.
  textarea.style.height = Math.min(textarea.scrollHeight, 480) + 'px';
}

// ============================================================================
// Init
// ============================================================================
async function init() {
  const ctx = detectStorageAvailability();

  // Surface ONE clear, plain-language banner up front. Everything downstream
  // uses these flags instead of dumping raw exception text into the UI.
  if (ctx.ephemeral || (!ctx.lsOk && !ctx.idbOk)) {
    state.previewMode = true;
    if (ctx.ephemeral) {
      showBanner(
        "This is a preview window — your entries won't be saved here. To use the tracker for real, open index.html directly in your browser (double-click the file, or host it on a server).",
        'info'
      );
    } else {
      showBanner(
        "Your browser is blocking all local storage, so entries won't be saved across reloads. Try opening this file in a different browser, or check your privacy / cookie settings.",
        'error'
      );
    }
  } else if (ctx.idbOk) {
    try {
      db = await openDB();
    } catch (_) {
      ctx.idbOk = false;
      if (ctx.lsOk) {
        showBanner("Your browser's primary storage isn't available. Entries will save to a backup copy only — please back up often using the Backup button.", 'warn');
      }
    }
  }

  if (!ctx.lsOk && !state.previewMode) {
    showBanner("Your browser's backup storage isn't available. Entries are still being saved, but please back up to a file regularly.", 'warn');
  }

  if (state.previewMode) {
    state.data = newEmptyData();
    seedDummyData(state.data);
  } else {
    const { data, source } = await loadData();
    state.data = data;
    if (db && (source === 'ls' || source === 'ls-only')) {
      // re-sync so both layers agree next load
      try { await save({ snapshot: false }); } catch (_) {}
    }
    // Seed demo entries only the first time — once we've ever seeded (or
    // the user has explicitly cleared everything), don't re-populate.
    if (state.data.entries.length === 0 && !state.data.meta.hasSeeded) {
      seedDummyData(state.data);
      state.data.meta.hasSeeded = true;
      await save({ snapshot: false });
    }
    await ensureInitialSnapshot(state.data);
  }

  checkPersistence();

  // Bind capture
  const ta = document.getElementById('entry-textarea');
  const dateEl = document.getElementById('entry-date');
  const timeEl = document.getElementById('entry-time');
  const addBtn = document.getElementById('entry-add-btn');
  const nowBtn = document.getElementById('entry-now-btn');

  // Set the date/time inputs to the current time and show/hide the Now button
  // accordingly. Used on load, after Add, by the periodic refresh, by the Now
  // button itself, and as the recovery path when the OS picker's "Reset"
  // wipes the field to blank on iOS.
  function resetDateTimeToNow() {
    const c = nowISO();
    dateEl.value = toDateInput(c);
    timeEl.value = toTimeInput(c);
    nowBtn.classList.add('hidden');
  }

  // Reveal the Now button whenever the picker is no longer on the current
  // minute. Cheaper than comparing Date objects — comparing the same string
  // form the inputs use.
  function updateNowButton() {
    if (!dateEl.value || !timeEl.value) { nowBtn.classList.add('hidden'); return; }
    const c = nowISO();
    const isNow = dateEl.value === toDateInput(c) && timeEl.value === toTimeInput(c);
    nowBtn.classList.toggle('hidden', isNow);
  }

  resetDateTimeToNow();

  ta.addEventListener('input', () => autoResize(ta));
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      addEntry();
    }
  });
  addBtn.addEventListener('click', addEntry);

  // If the OS picker's Reset action clears either field, snap both back to
  // current. Otherwise just keep the Now button in sync with the value.
  function onDateTimeChange() {
    if (!dateEl.value || !timeEl.value) resetDateTimeToNow();
    else updateNowButton();
  }
  dateEl.addEventListener('change', onDateTimeChange);
  timeEl.addEventListener('change', onDateTimeChange);
  dateEl.addEventListener('input', onDateTimeChange);
  timeEl.addEventListener('input', onDateTimeChange);
  nowBtn.addEventListener('click', () => { resetDateTimeToNow(); ta.focus(); });

  document.getElementById('copy-since-btn').addEventListener('click', copySinceLastExport);
  document.getElementById('more-btn').addEventListener('click', openMoreMenu);

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'modal-overlay') closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Keep the date/time fields current if the page stays open without
  // user interaction. Only update when the user hasn't manually changed them.
  setInterval(() => {
    const focused = document.activeElement;
    if (focused !== dateEl && focused !== timeEl && ta.value.trim() === '') {
      resetDateTimeToNow();
    }
    // Keep "Last entry X ago" fresh even when nothing is happening.
    updateStatusIndicator();
  }, 30 * 1000);

  render();
  ta.focus();
}

window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
